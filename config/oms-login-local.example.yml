oms:
  login:
    accounts:
      devb:
        username: your-devb-oms-username
        password: your-devb-oms-password
        totp-secret: your-devb-totp-secret
        level: 0
      deve:
        username: your-deve-oms-username
        password: your-deve-oms-password
        totp-secret: your-deve-totp-secret
        level: 0
      prod:
        enabled: false
        username: your-prod-oms-username
        password: your-prod-oms-password
        totp-secret: your-prod-totp-secret
        level: 1

gitlab:
  token: your-readonly-gitlab-token
  # Optional aliases. The Agent can also search GitLab projects dynamically from serviceHint or log text.
  projects:
    order: your-group/fr_f_deal_order
    account: your-group/account
    qim: your-group/qim
    msg_center: your-group/msg_center
