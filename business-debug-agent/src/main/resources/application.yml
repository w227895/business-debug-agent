server:
  port: 8080

spring:
  application:
    name: business-debug-agent
  thymeleaf:
    cache: false
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

logging:
  level:
    org.springframework.ai: INFO