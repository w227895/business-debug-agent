server:
  port: 8080

spring:
  config:
    import: optional:file:./config/oms-login-local.yml
  application:
    name: business-debug-agent
  datasource:
    url: jdbc:mysql://localhost:3306/business_debug_agent?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false
  ai:
    chat:
      observations:
        log-prompt: true
        log-completion: true
        include-error-logging: true
    tools:
      observations:
        include-content: true
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

logging:
  level:
    org.springframework.ai: DEBUG

business-api:
  services:
    order:
      base-urls:
        devb: https://order-devb.flightroutes24.com
        deve: https://order-deve.flightroutes24.com
        prod: https://order.flightroutes24.com

findlog:
  base-url: ${FINDLOG_BASE_URL:https://devtool.flightroutes24.com}
  accounts:
    dev:
      username: ${FINDLOG_DEV_USERNAME:}
      password: ${FINDLOG_DEV_PASSWORD:}
      totp-secret: ${FINDLOG_DEV_TOTP_SECRET:}
    prod:
      username: ${FINDLOG_PROD_USERNAME:prod}
      password: ${FINDLOG_PROD_PASSWORD:placeholder}
      totp-secret: ${FINDLOG_PROD_TOTP_SECRET:}

oms:
  login:
    public-key: 04eb5a97ac9efcfd5530d57643d6f4612c191e3071f45b3117a90175d4422eb6160da11ef707ef7c32348e1c04e3f4d33cc2ff833acea2a412418a4330c7f11e40
    accounts:
      devb:
        enabled: true
        sso-host: sso-devb.flightroutes24.com
        oms-host: oms-devb.flightroutes24.com
        username: ${OMS_DEVB_USERNAME:}
        password: ${OMS_DEVB_PASSWORD:}
        totp-secret: ${OMS_DEVB_TOTP_SECRET:}
        level: ${OMS_DEVB_LEVEL:0}
      deve:
        enabled: true
        sso-host: sso-deve.flightroutes24.com
        oms-host: oms-deve.flightroutes24.com
        username: ${OMS_DEVE_USERNAME:}
        password: ${OMS_DEVE_PASSWORD:}
        totp-secret: ${OMS_DEVE_TOTP_SECRET:}
        level: ${OMS_DEVE_LEVEL:0}
      prod:
        enabled: ${OMS_PROD_LOGIN_ENABLED:true}
        production: true
        sso-host: login.flightroutes24.com
        oms-host: oms.flightroutes24.com
        username: ${OMS_PROD_USERNAME:}
        password: ${OMS_PROD_PASSWORD:}
        totp-secret: ${OMS_PROD_TOTP_SECRET:}
        level: ${OMS_PROD_LEVEL:1}
