<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Debug Agent</title>
    <link rel="stylesheet" href="/css/agent.css?v=debug-console-2">
</head>
<body>
<main class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">AI</div>
            <div>
                <strong>Business Debug Agent</strong>
                <span>业务调试通道</span>
            </div>
        </div>

        <button id="newChatButton" class="primary-action" type="button">新建会话</button>

        <section class="side-section">
            <div class="section-heading">
                <h2>历史会话</h2>
                <span id="sessionCount">0</span>
            </div>
            <div id="sessionList" class="empty-state">暂无会话</div>
        </section>
    </aside>

    <section class="conversation">
        <header class="topbar">
            <div>
                <p class="eyebrow">Agent Console</p>
                <h1>对话调试</h1>
            </div>
            <div class="topbar-actions">
                <div class="session-chip environment-chip">
                    <span>当前环境</span>
                    <strong id="currentEnvironmentLabel">deve</strong>
                </div>
                <div class="session-chip">
                    <span>当前会话</span>
                    <strong id="currentSessionLabel">未开始</strong>
                </div>
            </div>
        </header>

        <section id="chatPanel" class="chat-panel">
            <div class="message assistant">
                <div class="avatar">A</div>
                <div class="message-body">
                    <div class="bubble markdown-body">
                        <p>你好，我是 DeepSeek 对话 Agent。你可以直接描述订单、日志、接口或业务现象，我会基于当前会话上下文继续追踪。</p>
                    </div>
                </div>
            </div>
        </section>

        <form id="chatForm" class="composer">
            <div class="composer-box">
                <textarea id="messageInput" name="message" rows="2" placeholder="输入业务问题，Enter 发送，Shift+Enter 换行"></textarea>
                <button type="submit" aria-label="发送消息">发送</button>
            </div>
        </form>
    </section>

    <aside class="inspector">
        <section class="inspector-card">
            <div class="inspector-header">
                <div>
                    <p class="eyebrow">Debug Context</p>
                    <h2>调试面板</h2>
                </div>
            </div>

            <div class="inspector-tabs" role="tablist" aria-label="调试面板">
                <button class="inspector-tab active" type="button" role="tab" aria-selected="true" data-inspector-tab="environment">运行环境</button>
                <button class="inspector-tab" type="button" role="tab" aria-selected="false" data-inspector-tab="model">模型配置</button>
                <button class="inspector-tab" type="button" role="tab" aria-selected="false" data-inspector-tab="token">Token</button>
                <button class="inspector-tab" type="button" role="tab" aria-selected="false" data-inspector-tab="memory">记忆</button>
                <button class="inspector-tab" type="button" role="tab" aria-selected="false" data-inspector-tab="calls">调用记录</button>
            </div>

            <section class="inspector-panel active" data-inspector-panel="environment">
                <div class="section-heading">
                    <h2>运行环境</h2>
                </div>
                <div id="environmentState" class="environment-options"></div>
            </section>

            <section class="inspector-panel" data-inspector-panel="model">
                <div class="section-heading">
                    <h2>模型配置</h2>
                    <button id="refreshModelsButton" class="ghost-action" type="button">刷新</button>
                </div>
                <div id="modelState" class="empty-state">正在读取模型配置</div>
            </section>

            <section class="inspector-panel" data-inspector-panel="token">
                <div class="section-heading">
                    <h2>Token 消耗</h2>
                </div>
                <div id="tokenState" class="empty-state">暂无消耗</div>
            </section>

            <section class="inspector-panel" data-inspector-panel="memory">
                <div class="section-heading">
                    <h2>当前记忆</h2>
                </div>
                <div id="memoryState" class="empty-state">暂无记忆</div>
            </section>

            <section class="inspector-panel" data-inspector-panel="calls">
                <div class="section-heading">
                    <h2>模型调用记录</h2>
                    <button id="refreshCallsButton" class="ghost-action" type="button">刷新</button>
                </div>
                <div id="modelCallState" class="empty-state">暂无调用记录</div>
            </section>
        </section>
    </aside>
</main>

<script>
    const chatPanel = document.getElementById('chatPanel');
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');
    const memoryState = document.getElementById('memoryState');
    const tokenState = document.getElementById('tokenState');
    const modelState = document.getElementById('modelState');
    const modelCallState = document.getElementById('modelCallState');
    const newChatButton = document.getElementById('newChatButton');
    const refreshModelsButton = document.getElementById('refreshModelsButton');
    const refreshCallsButton = document.getElementById('refreshCallsButton');
    const sessionList = document.getElementById('sessionList');
    const sessionCount = document.getElementById('sessionCount');
    const currentSessionLabel = document.getElementById('currentSessionLabel');
    const currentEnvironmentLabel = document.getElementById('currentEnvironmentLabel');
    const environmentState = document.getElementById('environmentState');

    let sessionId = localStorage.getItem('debug-agent-session-id') || '';
    let currentEnvironment = normalizeEnvironment(localStorage.getItem('debug-agent-environment') || 'deve');
    let activeModelLabel = 'DeepSeek';
    const environments = [
        {code: 'deve', label: 'DEVE', hint: '测试环境'},
        {code: 'devb', label: 'DEVB', hint: '联调环境'},
        {code: 'prod', label: 'PROD', hint: '生产环境'}
    ];

    setupInspectorTabs();
    renderEnvironmentOptions();
    loadModels();
    loadSessions();
    loadSession();
    updateSessionLabel();

    newChatButton.addEventListener('click', () => {
        startNewChat();
    });

    refreshCallsButton.addEventListener('click', async () => {
        await loadModelCalls();
        activateInspectorTab('calls');
    });

    refreshModelsButton.addEventListener('click', async () => {
        await loadModels();
        activateInspectorTab('model');
    });

    chatForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        await sendMessage();
    });

    messageInput.addEventListener('keydown', async (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            await sendMessage();
        }
    });

    function setupInspectorTabs() {
        document.querySelectorAll('.inspector-tab').forEach((button) => {
            button.addEventListener('click', () => activateInspectorTab(button.dataset.inspectorTab));
        });
    }

    function activateInspectorTab(tabName) {
        document.querySelectorAll('.inspector-tab').forEach((button) => {
            const active = button.dataset.inspectorTab === tabName;
            button.classList.toggle('active', active);
            button.setAttribute('aria-selected', String(active));
        });
        document.querySelectorAll('.inspector-panel').forEach((panel) => {
            panel.classList.toggle('active', panel.dataset.inspectorPanel === tabName);
        });
    }

    function startNewChat() {
        sessionId = '';
        localStorage.removeItem('debug-agent-session-id');
        renderWelcome();
        renderMemory({});
        renderTokenUsage({});
        renderModelCalls([]);
        updateSessionLabel();
        loadSessions();
        messageInput.focus();
    }

    async function loadSession() {
        if (!sessionId) {
            return;
        }

        try {
            const response = await fetch(`/api/chat/${encodeURIComponent(sessionId)}`);
            if (!response.ok) {
                return;
            }
            const body = await response.json();
            sessionId = body.sessionId;
            localStorage.setItem('debug-agent-session-id', sessionId);
            updateSessionLabel();
            renderMessages(body.messages);
            renderMemory(body.memory);
            renderTokenUsage(body.totalTokenUsage);
            await loadModelCalls();
        } catch (ignore) {
        }
    }

    async function loadSessions() {
        try {
            const response = await fetch('/api/chat/sessions');
            if (!response.ok) {
                return;
            }
            renderSessions(await response.json());
        } catch (ignore) {
        }
    }

    async function loadModels() {
        try {
            const response = await fetch('/api/chat/models');
            if (!response.ok) {
                return;
            }
            renderModels(await response.json());
        } catch (ignore) {
        }
    }

    async function loadModelCalls() {
        if (!sessionId) {
            renderModelCalls([]);
            return;
        }

        try {
            const response = await fetch(`/api/chat/${encodeURIComponent(sessionId)}/model-calls`);
            if (!response.ok) {
                return;
            }
            renderModelCalls(await response.json());
        } catch (ignore) {
        }
    }

    async function switchSession(nextSessionId) {
        if (!nextSessionId || nextSessionId === sessionId) {
            return;
        }
        sessionId = nextSessionId;
        localStorage.setItem('debug-agent-session-id', sessionId);
        updateSessionLabel();
        await loadSession();
        await loadSessions();
    }

    async function deleteSession(targetSessionId) {
        if (!targetSessionId) {
            return;
        }
        const confirmed = window.confirm('删除这个会话？');
        if (!confirmed) {
            return;
        }

        try {
            const response = await fetch(`/api/chat/${encodeURIComponent(targetSessionId)}`, {
                method: 'DELETE'
            });
            if (!response.ok) {
                let errorText = `HTTP ${response.status}`;
                try {
                    const errorBody = await response.json();
                    errorText = errorBody.message || errorText;
                } catch (ignore) {
                }
                throw new Error(errorText);
            }

            if (targetSessionId === sessionId) {
                startNewChat();
                return;
            }
            await loadSessions();
        } catch (error) {
            appendMessage('assistant', `会话删除失败：${error.message}`);
        }
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) {
            return;
        }

        const detectedEnvironment = detectEnvironment(message);
        if (detectedEnvironment && detectedEnvironment !== currentEnvironment) {
            switchEnvironment(detectedEnvironment);
        }

        appendMessage('user', message);
        messageInput.value = '';
        const assistantMessage = appendMessage('assistant', `正在调用 ${activeModelLabel}...`, undefined, true);

        try {
            const response = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sessionId, environment: currentEnvironment, message})
            });
            if (!response.ok) {
                let errorText = `HTTP ${response.status}`;
                try {
                    const errorBody = await response.json();
                    errorText = errorBody.message || errorText;
                } catch (ignore) {
                }
                throw new Error(errorText);
            }
            const body = await readChatStream(response, assistantMessage);
            sessionId = body.sessionId;
            localStorage.setItem('debug-agent-session-id', sessionId);
            updateSessionLabel();

            updateMessage(assistantMessage, body.reply, body.tokenUsage, false, body.toolCalls);
            renderMemory(body.memory);
            renderTokenUsage(body.totalTokenUsage);
            await loadModelCalls();
            loadSessions();
        } catch (error) {
            removePendingMessage();
            appendMessage('assistant', `模型调用失败：${error.message}。请确认 DEEPSEEK_API_KEY 已配置，并查看后端日志。`);
            await loadModelCalls();
        }
    }

    async function readChatStream(response, assistantMessage) {
        if (!response.body) {
            return response.json();
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let streamedContent = '';
        let finalBody = null;

        while (true) {
            const {value, done} = await reader.read();
            if (done) {
                break;
            }

            buffer += decoder.decode(value, {stream: true});
            const events = buffer.split('\n\n');
            buffer = events.pop() || '';
            for (const rawEvent of events) {
                const event = parseSseEvent(rawEvent);
                if (!event) {
                    continue;
                }
                if (event.name === 'delta') {
                    streamedContent += String(event.data.content || '');
                    updateMessage(assistantMessage, streamedContent || `正在调用 ${activeModelLabel}...`, undefined, true);
                } else if (event.name === 'complete') {
                    finalBody = event.data;
                } else if (event.name === 'error') {
                    throw new Error(event.data.message || '模型流式调用失败');
                }
            }
        }

        if (buffer.trim()) {
            const event = parseSseEvent(buffer);
            if (event && event.name === 'complete') {
                finalBody = event.data;
            } else if (event && event.name === 'error') {
                throw new Error(event.data.message || '模型流式调用失败');
            }
        }

        if (!finalBody) {
            throw new Error('模型流式响应提前结束');
        }
        return finalBody;
    }

    function parseSseEvent(rawEvent) {
        const lines = String(rawEvent || '').split('\n');
        let name = 'message';
        const dataLines = [];
        for (const line of lines) {
            if (line.startsWith('event:')) {
                name = line.slice('event:'.length).trim();
            } else if (line.startsWith('data:')) {
                dataLines.push(line.slice('data:'.length).trimStart());
            }
        }
        if (dataLines.length === 0) {
            return null;
        }
        const dataText = dataLines.join('\n');
        try {
            return {name, data: JSON.parse(dataText)};
        } catch (ignore) {
            return {name, data: {content: dataText}};
        }
    }

    async function switchModel(modelId) {
        if (!modelId) {
            return;
        }

        modelState.classList.add('is-busy');
        try {
            const response = await fetch('/api/chat/models/active', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({modelId: Number(modelId)})
            });
            if (!response.ok) {
                let errorText = `HTTP ${response.status}`;
                try {
                    const errorBody = await response.json();
                    errorText = errorBody.message || errorText;
                } catch (ignore) {
                }
                throw new Error(errorText);
            }
            await loadModels();
        } catch (error) {
            modelState.className = 'empty-state';
            modelState.textContent = `模型切换失败：${error.message}`;
        }
    }

    function switchEnvironment(environment) {
        currentEnvironment = normalizeEnvironment(environment);
        localStorage.setItem('debug-agent-environment', currentEnvironment);
        renderEnvironmentOptions();
    }

    function renderEnvironmentOptions() {
        currentEnvironmentLabel.textContent = currentEnvironment;
        environmentState.innerHTML = environments.map((item) => {
            const activeClass = item.code === currentEnvironment ? ' active' : '';
            return `
                <button class="environment-option${activeClass}" type="button" data-environment="${item.code}">
                    <strong>${item.label}</strong>
                    <span>${item.hint}</span>
                </button>
            `;
        }).join('');

        environmentState.querySelectorAll('.environment-option').forEach((button) => {
            button.addEventListener('click', () => switchEnvironment(button.dataset.environment));
        });
    }

    function appendMessage(role, content, tokenUsage, pending = false, toolCalls = []) {
        const wrapper = document.createElement('div');
        const isUser = role === 'user';
        wrapper.className = `message ${role}${pending ? ' pending' : ''}`;
        wrapper.innerHTML = `
            <div class="avatar">${isUser ? 'U' : 'A'}</div>
            <div class="message-body">
                <div class="bubble ${isUser ? '' : 'markdown-body'}">${isUser ? renderPlainText(content) : renderMarkdown(content)}</div>
                ${renderMessageTokenUsage(role, tokenUsage)}
                ${renderMessageToolCalls(role, toolCalls)}
            </div>
        `;
        chatPanel.appendChild(wrapper);
        chatPanel.scrollTop = chatPanel.scrollHeight;
        return wrapper;
    }

    function updateMessage(wrapper, content, tokenUsage, pending = false, toolCalls = []) {
        if (!wrapper) {
            return;
        }
        const role = wrapper.classList.contains('user') ? 'user' : 'assistant';
        const isUser = role === 'user';
        wrapper.className = `message ${role}${pending ? ' pending' : ''}`;
        const body = wrapper.querySelector('.message-body');
        if (!body) {
            return;
        }
        body.innerHTML = `
            <div class="bubble ${isUser ? '' : 'markdown-body'}">${isUser ? renderPlainText(content) : renderMarkdown(content)}</div>
            ${renderMessageTokenUsage(role, tokenUsage)}
            ${renderMessageToolCalls(role, toolCalls)}
        `;
        chatPanel.scrollTop = chatPanel.scrollHeight;
    }

    function removePendingMessage() {
        const pending = chatPanel.querySelector('.message.pending');
        if (pending) {
            pending.remove();
        }
    }

    function renderWelcome() {
        chatPanel.innerHTML = `
            <div class="message assistant">
                <div class="avatar">A</div>
                <div class="message-body">
                    <div class="bubble markdown-body">
                        <p>你好，我是 DeepSeek 对话 Agent。你可以直接描述订单、日志、接口或业务现象，我会基于当前会话上下文继续追踪。</p>
                    </div>
                </div>
            </div>
        `;
    }

    function renderMessages(messages) {
        if (!Array.isArray(messages) || messages.length === 0) {
            renderWelcome();
            return;
        }
        chatPanel.innerHTML = '';
        for (const item of messages) {
            appendMessage(item.role, item.content, item.tokenUsage, false, item.toolCalls);
        }
    }

    function renderMessageTokenUsage(role, tokenUsage) {
        if (role !== 'assistant' || !tokenUsage || !hasTokens(tokenUsage)) {
            return '';
        }
        return `
            <div class="message-meta">
                本轮 ${formatNumber(tokenUsage.totalTokens)} tokens
                <span>输入 ${formatNumber(tokenUsage.promptTokens)} / 输出 ${formatNumber(tokenUsage.completionTokens)}</span>
            </div>
        `;
    }

    function renderMessageToolCalls(role, toolCalls) {
        const calls = Array.isArray(toolCalls) ? toolCalls : [];
        if (role !== 'assistant' || calls.length === 0) {
            return '';
        }
        return `
            <div class="message-tools" aria-label="本轮工具调用">
                <span>Tools</span>
                ${calls.map((item) => {
                    const statusClass = item.success ? 'ok' : 'failed';
                    const statusText = item.success ? '成功' : '失败';
                    return `
                        <span class="tool-chip ${statusClass}" title="${escapeHtml(statusText)} · ${formatNumber(item.durationMillis)} ms">
                            ${escapeHtml(item.name || 'tool')}
                        </span>
                    `;
                }).join('')}
            </div>
        `;
    }

    function renderSessions(sessions) {
        const items = Array.isArray(sessions) ? sessions : [];
        sessionCount.textContent = String(items.length);
        if (items.length === 0) {
            sessionList.className = 'empty-state';
            sessionList.textContent = '暂无会话';
            return;
        }

        sessionList.className = 'session-list';
        sessionList.innerHTML = items.map((item) => {
            const activeClass = item.sessionId === sessionId ? ' active' : '';
            const escapedSessionId = escapeHtml(item.sessionId);
            return `
                <article class="session-item${activeClass}">
                    <button class="session-open" type="button" data-session-id="${escapedSessionId}">
                        <span>${escapeHtml(item.title)}</span>
                        <small>${formatTime(item.updatedAt)}</small>
                    </button>
                    <button class="session-delete" type="button" data-session-id="${escapedSessionId}" title="删除会话" aria-label="删除会话">×</button>
                </article>
            `;
        }).join('');

        sessionList.querySelectorAll('.session-open').forEach((item) => {
            item.addEventListener('click', () => switchSession(item.dataset.sessionId));
        });
        sessionList.querySelectorAll('.session-delete').forEach((item) => {
            item.addEventListener('click', () => deleteSession(item.dataset.sessionId));
        });
    }

    function renderMemory(memory) {
        const entries = Object.entries(memory || {});
        if (entries.length === 0) {
            memoryState.className = 'empty-state';
            memoryState.textContent = '暂无记忆';
            return;
        }
        memoryState.className = 'memory-list';
        memoryState.innerHTML = entries.map(([key, value]) => `
            <div class="kv-row">
                <span>${escapeHtml(key)}</span>
                <strong>${escapeHtml(value)}</strong>
            </div>
        `).join('');
    }

    function renderTokenUsage(tokenUsage) {
        if (!tokenUsage || !hasTokens(tokenUsage)) {
            tokenState.className = 'empty-state';
            tokenState.textContent = '暂无消耗';
            return;
        }
        tokenState.className = 'token-grid';
        tokenState.innerHTML = `
            <div><span>总计</span><strong>${formatNumber(tokenUsage.totalTokens)}</strong></div>
            <div><span>输入</span><strong>${formatNumber(tokenUsage.promptTokens)}</strong></div>
            <div><span>输出</span><strong>${formatNumber(tokenUsage.completionTokens)}</strong></div>
        `;
    }

    function renderModels(models) {
        const items = Array.isArray(models) ? models : [];
        if (items.length === 0) {
            modelState.className = 'empty-state';
            modelState.textContent = '暂无可用模型';
            activeModelLabel = 'DeepSeek';
            return;
        }

        const active = items.find((item) => item.active) || items[0];
        activeModelLabel = active.displayName || active.model || active.provider || '模型';
        modelState.className = 'model-list';
        modelState.innerHTML = items.map((item) => {
            const activeClass = item.active ? ' active' : '';
            const disabled = item.active ? 'disabled' : '';
            const actionText = item.active ? '使用中' : '切换';
            return `
                <article class="model-item${activeClass}">
                    <div>
                        <strong>${escapeHtml(item.displayName || item.model)}</strong>
                        <span>${escapeHtml(item.provider)} / ${escapeHtml(item.model)}</span>
                    </div>
                    <button class="model-switch" type="button" data-model-id="${item.id}" ${disabled}>${actionText}</button>
                </article>
            `;
        }).join('');

        modelState.querySelectorAll('.model-switch').forEach((button) => {
            button.addEventListener('click', () => switchModel(button.dataset.modelId));
        });
    }

    function renderModelCalls(calls) {
        const items = Array.isArray(calls) ? calls : [];
        if (items.length === 0) {
            modelCallState.className = 'empty-state';
            modelCallState.textContent = '暂无调用记录';
            return;
        }

        modelCallState.className = 'call-list';
        modelCallState.innerHTML = items.map((item) => {
            const usage = item.tokenUsage || {};
            const statusClass = item.success ? 'ok' : 'failed';
            const statusText = item.success ? '成功' : '失败';
            const responseText = item.success ? item.responseText : (item.errorMessage || '无错误详情');
            return `
                <article class="call-item">
                    <div class="call-head">
                        <span class="status-pill ${statusClass}">${statusText}</span>
                        <strong>${escapeHtml(item.model || item.provider || 'model')}</strong>
                        <time>${formatTime(item.createdAt)}</time>
                    </div>
                    <div class="call-metrics">
                        <span>${formatNumber(item.durationMillis)} ms</span>
                        <span>${formatNumber(usage.totalTokens)} tokens</span>
                    </div>
                    <details>
                        <summary>Prompt</summary>
                        <pre>${escapeHtml(formatPrompt(item.requestMessagesJson))}</pre>
                    </details>
                    <details>
                        <summary>${item.success ? 'Response' : 'Error'}</summary>
                        <pre>${escapeHtml(responseText || '')}</pre>
                    </details>
                </article>
            `;
        }).join('');
    }

    function renderMarkdown(value) {
        const lines = String(value ?? '').replace(/\r\n/g, '\n').split('\n');
        const html = [];
        let index = 0;

        while (index < lines.length) {
            const line = lines[index];

            if (!line.trim()) {
                index += 1;
                continue;
            }

            const fence = line.match(/^```([\w-]*)\s*$/);
            if (fence) {
                const codeLines = [];
                index += 1;
                while (index < lines.length && !/^```\s*$/.test(lines[index])) {
                    codeLines.push(lines[index]);
                    index += 1;
                }
                if (index < lines.length) {
                    index += 1;
                }
                const language = fence[1] ? `<span>${escapeHtml(fence[1])}</span>` : '';
                html.push(`<div class="code-shell"><div class="code-head">${language}</div><pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre></div>`);
                continue;
            }

            if (isTableStart(lines, index)) {
                const tableLines = [];
                tableLines.push(lines[index]);
                index += 2;
                while (index < lines.length && isTableRow(lines[index])) {
                    tableLines.push(lines[index]);
                    index += 1;
                }
                html.push(renderMarkdownTable(tableLines));
                continue;
            }

            const heading = line.match(/^(#{1,4})\s+(.+)$/);
            if (heading) {
                const level = Math.min(heading[1].length + 1, 5);
                html.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
                index += 1;
                continue;
            }

            if (/^>\s?/.test(line)) {
                const quoteLines = [];
                while (index < lines.length && /^>\s?/.test(lines[index])) {
                    quoteLines.push(lines[index].replace(/^>\s?/, ''));
                    index += 1;
                }
                html.push(`<blockquote>${quoteLines.map(renderInlineMarkdown).join('<br>')}</blockquote>`);
                continue;
            }

            if (/^\s*[-*]\s+/.test(line)) {
                const items = [];
                while (index < lines.length && /^\s*[-*]\s+/.test(lines[index])) {
                    items.push(lines[index].replace(/^\s*[-*]\s+/, ''));
                    index += 1;
                }
                html.push(`<ul>${items.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join('')}</ul>`);
                continue;
            }

            if (/^\s*\d+\.\s+/.test(line)) {
                const items = [];
                while (index < lines.length && /^\s*\d+\.\s+/.test(lines[index])) {
                    items.push(lines[index].replace(/^\s*\d+\.\s+/, ''));
                    index += 1;
                }
                html.push(`<ol>${items.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join('')}</ol>`);
                continue;
            }

            if (/^(状态|提示|注意|错误|成功|失败|进度|结论)[:：]/.test(line.trim())) {
                html.push(`<div class="md-callout">${renderInlineMarkdown(line.trim())}</div>`);
                index += 1;
                continue;
            }

            const paragraph = [];
            while (index < lines.length && lines[index].trim() && !isMarkdownBoundary(lines, index)) {
                paragraph.push(lines[index]);
                index += 1;
            }
            html.push(`<p>${paragraph.map(renderInlineMarkdown).join('<br>')}</p>`);
        }

        return html.join('') || '<p></p>';
    }

    function renderPlainText(value) {
        return escapeHtml(value).replace(/\n/g, '<br>');
    }

    function renderInlineMarkdown(value) {
        const codeFragments = [];
        let text = String(value ?? '').replace(/`([^`]+)`/g, (_, code) => {
            const token = `@@CODE_${codeFragments.length}@@`;
            codeFragments.push(`<code>${escapeHtml(code)}</code>`);
            return token;
        });

        text = escapeHtml(text)
            .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
            .replace(/__([^_]+)__/g, '<strong>$1</strong>');

        codeFragments.forEach((fragment, index) => {
            text = text.replace(`@@CODE_${index}@@`, fragment);
        });
        return text;
    }

    function isMarkdownBoundary(lines, index) {
        const line = lines[index] || '';
        return /^```/.test(line)
            || isTableStart(lines, index)
            || /^(#{1,4})\s+/.test(line)
            || /^>\s?/.test(line)
            || /^\s*[-*]\s+/.test(line)
            || /^\s*\d+\.\s+/.test(line)
            || /^(状态|提示|注意|错误|成功|失败|进度|结论)[:：]/.test(line.trim());
    }

    function isTableStart(lines, index) {
        return isTableRow(lines[index]) && /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[index + 1] || '');
    }

    function isTableRow(line) {
        return typeof line === 'string' && line.includes('|') && line.trim().length > 0;
    }

    function splitTableCells(line) {
        return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map((cell) => cell.trim());
    }

    function renderMarkdownTable(tableLines) {
        const headerCells = splitTableCells(tableLines[0]);
        const bodyRows = tableLines.slice(1).map(splitTableCells);
        return `
            <div class="table-wrap">
                <table>
                    <thead><tr>${headerCells.map((cell) => `<th>${renderInlineMarkdown(cell)}</th>`).join('')}</tr></thead>
                    <tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${renderInlineMarkdown(cell)}</td>`).join('')}</tr>`).join('')}</tbody>
                </table>
            </div>
        `;
    }

    function formatPrompt(value) {
        if (!value) {
            return '';
        }
        try {
            const messages = JSON.parse(value);
            if (!Array.isArray(messages)) {
                return JSON.stringify(messages, null, 2);
            }
            return messages.map((item) => `[${item.role}]\n${item.content}`).join('\n\n');
        } catch (ignore) {
            return value;
        }
    }

    function updateSessionLabel() {
        currentSessionLabel.textContent = sessionId ? `${sessionId.slice(0, 8)}...` : '未开始';
    }

    function detectEnvironment(message) {
        const value = String(message || '').toLowerCase();
        if (/\bdevb\b/.test(value)) {
            return 'devb';
        }
        if (/\bdeve\b/.test(value)) {
            return 'deve';
        }
        if (/\bprod\b|生产环境|线上环境/.test(value)) {
            return 'prod';
        }
        return '';
    }

    function normalizeEnvironment(environment) {
        const value = String(environment || '').trim().toLowerCase();
        return ['devb', 'deve', 'prod'].includes(value) ? value : 'deve';
    }

    function hasTokens(tokenUsage) {
        return Number(tokenUsage.totalTokens || 0) > 0
            || Number(tokenUsage.promptTokens || 0) > 0
            || Number(tokenUsage.completionTokens || 0) > 0;
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function formatTime(value) {
        if (!value) {
            return '';
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
            return '';
        }
        return date.toLocaleString('zh-CN', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function formatNumber(value) {
        return Number(value || 0).toLocaleString('zh-CN');
    }
</script>
</body>
</html>
