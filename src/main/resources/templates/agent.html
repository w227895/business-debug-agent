<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Debug Agent</title>
    <link rel="stylesheet" href="/css/agent.css">
</head>
<body>
<main class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">AI</div>
            <div>
                <strong>Business Debug Agent</strong>
                <span>DeepSeek 调试工作台</span>
            </div>
        </div>

        <button id="newChatButton" class="primary-action" type="button">新建会话</button>

        <section class="side-section">
            <div class="section-heading">
                <h2>历史会话</h2>
                <span id="sessionCount">0</span>
            </div>
            <div id="sessionList" class="empty-state">暂无会话</div>
        </section>
    </aside>

    <section class="conversation">
        <header class="topbar">
            <div>
                <p class="eyebrow">Conversation</p>
                <h1>对话调试</h1>
            </div>
            <div class="session-chip">
                <span>当前会话</span>
                <strong id="currentSessionLabel">未开始</strong>
            </div>
        </header>

        <section id="chatPanel" class="chat-panel">
            <div class="message assistant">
                <div class="avatar">A</div>
                <div class="bubble">
                    你好，我是 DeepSeek 对话 Agent。你可以先告诉我你的名字或目标，然后继续追问，我会基于当前会话历史回答。
                </div>
            </div>
        </section>

        <form id="chatForm" class="composer">
            <textarea id="messageInput" name="message" rows="3" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
            <button type="submit">发送</button>
        </form>
    </section>

    <aside class="inspector">
        <section class="inspector-section">
            <div class="section-heading">
                <h2>模型配置</h2>
                <button id="refreshModelsButton" class="ghost-action" type="button">刷新</button>
            </div>
            <div id="modelState" class="empty-state">正在读取模型配置</div>
        </section>

        <section class="inspector-section">
            <div class="section-heading">
                <h2>Token 消耗</h2>
            </div>
            <div id="tokenState" class="empty-state">暂无消耗</div>
        </section>

        <section class="inspector-section">
            <div class="section-heading">
                <h2>当前记忆</h2>
            </div>
            <div id="memoryState" class="empty-state">暂无记忆</div>
        </section>

        <section class="inspector-section call-section">
            <div class="section-heading">
                <h2>模型调用记录</h2>
                <button id="refreshCallsButton" class="ghost-action" type="button">刷新</button>
            </div>
            <div id="modelCallState" class="empty-state">暂无调用记录</div>
        </section>
    </aside>
</main>

<script>
    const chatPanel = document.getElementById('chatPanel');
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');
    const memoryState = document.getElementById('memoryState');
    const tokenState = document.getElementById('tokenState');
    const modelState = document.getElementById('modelState');
    const modelCallState = document.getElementById('modelCallState');
    const newChatButton = document.getElementById('newChatButton');
    const refreshModelsButton = document.getElementById('refreshModelsButton');
    const refreshCallsButton = document.getElementById('refreshCallsButton');
    const sessionList = document.getElementById('sessionList');
    const sessionCount = document.getElementById('sessionCount');
    const currentSessionLabel = document.getElementById('currentSessionLabel');

    let sessionId = localStorage.getItem('debug-agent-session-id') || '';
    let activeModelLabel = 'DeepSeek';

    loadModels();
    loadSessions();
    loadSession();
    updateSessionLabel();

    newChatButton.addEventListener('click', () => {
        startNewChat();
    });

    refreshCallsButton.addEventListener('click', async () => {
        await loadModelCalls();
    });

    refreshModelsButton.addEventListener('click', async () => {
        await loadModels();
    });

    chatForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        await sendMessage();
    });

    messageInput.addEventListener('keydown', async (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            await sendMessage();
        }
    });

    function startNewChat() {
        sessionId = '';
        localStorage.removeItem('debug-agent-session-id');
        renderWelcome();
        renderMemory({});
        renderTokenUsage({});
        renderModelCalls([]);
        updateSessionLabel();
        loadSessions();
        messageInput.focus();
    }

    async function loadSession() {
        if (!sessionId) {
            return;
        }

        try {
            const response = await fetch(`/api/chat/${encodeURIComponent(sessionId)}`);
            if (!response.ok) {
                return;
            }
            const body = await response.json();
            sessionId = body.sessionId;
            localStorage.setItem('debug-agent-session-id', sessionId);
            updateSessionLabel();
            renderMessages(body.messages);
            renderMemory(body.memory);
            renderTokenUsage(body.totalTokenUsage);
            await loadModelCalls();
        } catch (ignore) {
        }
    }

    async function loadSessions() {
        try {
            const response = await fetch('/api/chat/sessions');
            if (!response.ok) {
                return;
            }
            renderSessions(await response.json());
        } catch (ignore) {
        }
    }

    async function loadModels() {
        try {
            const response = await fetch('/api/chat/models');
            if (!response.ok) {
                return;
            }
            renderModels(await response.json());
        } catch (ignore) {
        }
    }

    async function loadModelCalls() {
        if (!sessionId) {
            renderModelCalls([]);
            return;
        }

        try {
            const response = await fetch(`/api/chat/${encodeURIComponent(sessionId)}/model-calls`);
            if (!response.ok) {
                return;
            }
            renderModelCalls(await response.json());
        } catch (ignore) {
        }
    }

    async function switchSession(nextSessionId) {
        if (!nextSessionId || nextSessionId === sessionId) {
            return;
        }
        sessionId = nextSessionId;
        localStorage.setItem('debug-agent-session-id', sessionId);
        updateSessionLabel();
        await loadSession();
        await loadSessions();
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) {
            return;
        }

        appendMessage('user', message);
        messageInput.value = '';
        appendMessage('assistant', `正在调用 ${activeModelLabel}...`, undefined, true);

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sessionId, message})
            });
            if (!response.ok) {
                let errorText = `HTTP ${response.status}`;
                try {
                    const errorBody = await response.json();
                    errorText = errorBody.message || errorText;
                } catch (ignore) {
                }
                throw new Error(errorText);
            }
            const body = await response.json();
            sessionId = body.sessionId;
            localStorage.setItem('debug-agent-session-id', sessionId);
            updateSessionLabel();

            removePendingMessage();
            appendMessage('assistant', body.reply, body.tokenUsage);
            renderMemory(body.memory);
            renderTokenUsage(body.totalTokenUsage);
            await loadModelCalls();
            loadSessions();
        } catch (error) {
            removePendingMessage();
            appendMessage('assistant', `模型调用失败：${error.message}。请确认 DEEPSEEK_API_KEY 已配置，并查看后端日志。`);
            await loadModelCalls();
        }
    }

    async function switchModel(modelId) {
        if (!modelId) {
            return;
        }

        modelState.classList.add('is-busy');
        try {
            const response = await fetch('/api/chat/models/active', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({modelId: Number(modelId)})
            });
            if (!response.ok) {
                let errorText = `HTTP ${response.status}`;
                try {
                    const errorBody = await response.json();
                    errorText = errorBody.message || errorText;
                } catch (ignore) {
                }
                throw new Error(errorText);
            }
            await loadModels();
        } catch (error) {
            modelState.className = 'empty-state';
            modelState.textContent = `模型切换失败：${error.message}`;
        }
    }

    function appendMessage(role, content, tokenUsage, pending = false) {
        const wrapper = document.createElement('div');
        wrapper.className = `message ${role}${pending ? ' pending' : ''}`;
        wrapper.innerHTML = `
            <div class="avatar">${role === 'user' ? 'U' : 'A'}</div>
            <div>
                <div class="bubble">${escapeHtml(content)}</div>
                ${renderMessageTokenUsage(role, tokenUsage)}
            </div>
        `;
        chatPanel.appendChild(wrapper);
        chatPanel.scrollTop = chatPanel.scrollHeight;
    }

    function removePendingMessage() {
        const pending = chatPanel.querySelector('.message.pending');
        if (pending) {
            pending.remove();
        }
    }

    function renderWelcome() {
        chatPanel.innerHTML = `
            <div class="message assistant">
                <div class="avatar">A</div>
                <div class="bubble">
                    你好，我是 DeepSeek 对话 Agent。你可以先告诉我你的名字或目标，然后继续追问，我会基于当前会话历史回答。
                </div>
            </div>
        `;
    }

    function renderMessages(messages) {
        if (!Array.isArray(messages) || messages.length === 0) {
            renderWelcome();
            return;
        }
        chatPanel.innerHTML = '';
        for (const item of messages) {
            appendMessage(item.role, item.content, item.tokenUsage);
        }
    }

    function renderMessageTokenUsage(role, tokenUsage) {
        if (role !== 'assistant' || !tokenUsage || !hasTokens(tokenUsage)) {
            return '';
        }
        return `
            <div class="message-meta">
                本轮 ${formatNumber(tokenUsage.totalTokens)} tokens
                <span>输入 ${formatNumber(tokenUsage.promptTokens)} / 输出 ${formatNumber(tokenUsage.completionTokens)}</span>
            </div>
        `;
    }

    function renderSessions(sessions) {
        const items = Array.isArray(sessions) ? sessions : [];
        sessionCount.textContent = String(items.length);
        if (items.length === 0) {
            sessionList.className = 'empty-state';
            sessionList.textContent = '暂无会话';
            return;
        }

        sessionList.className = 'session-list';
        sessionList.innerHTML = items.map((item) => {
            const activeClass = item.sessionId === sessionId ? ' active' : '';
            return `
                <button class="session-item${activeClass}" type="button" data-session-id="${escapeHtml(item.sessionId)}">
                    <span>${escapeHtml(item.title)}</span>
                    <small>${formatTime(item.updatedAt)}</small>
                </button>
            `;
        }).join('');

        sessionList.querySelectorAll('.session-item').forEach((item) => {
            item.addEventListener('click', () => switchSession(item.dataset.sessionId));
        });
    }

    function renderMemory(memory) {
        const entries = Object.entries(memory || {});
        if (entries.length === 0) {
            memoryState.className = 'empty-state';
            memoryState.textContent = '暂无记忆';
            return;
        }
        memoryState.className = 'memory-list';
        memoryState.innerHTML = entries.map(([key, value]) => `
            <div class="kv-row">
                <span>${escapeHtml(key)}</span>
                <strong>${escapeHtml(value)}</strong>
            </div>
        `).join('');
    }

    function renderTokenUsage(tokenUsage) {
        if (!tokenUsage || !hasTokens(tokenUsage)) {
            tokenState.className = 'empty-state';
            tokenState.textContent = '暂无消耗';
            return;
        }
        tokenState.className = 'token-grid';
        tokenState.innerHTML = `
            <div><span>总计</span><strong>${formatNumber(tokenUsage.totalTokens)}</strong></div>
            <div><span>输入</span><strong>${formatNumber(tokenUsage.promptTokens)}</strong></div>
            <div><span>输出</span><strong>${formatNumber(tokenUsage.completionTokens)}</strong></div>
        `;
    }

    function renderModels(models) {
        const items = Array.isArray(models) ? models : [];
        if (items.length === 0) {
            modelState.className = 'empty-state';
            modelState.textContent = '暂无可用模型';
            activeModelLabel = 'DeepSeek';
            return;
        }

        const active = items.find((item) => item.active) || items[0];
        activeModelLabel = active.displayName || active.model || active.provider || '模型';
        modelState.className = 'model-list';
        modelState.innerHTML = items.map((item) => {
            const activeClass = item.active ? ' active' : '';
            const disabled = item.active ? 'disabled' : '';
            const actionText = item.active ? '使用中' : '切换';
            return `
                <article class="model-item${activeClass}">
                    <div>
                        <strong>${escapeHtml(item.displayName || item.model)}</strong>
                        <span>${escapeHtml(item.provider)} / ${escapeHtml(item.model)}</span>
                    </div>
                    <button class="model-switch" type="button" data-model-id="${item.id}" ${disabled}>${actionText}</button>
                </article>
            `;
        }).join('');

        modelState.querySelectorAll('.model-switch').forEach((button) => {
            button.addEventListener('click', () => switchModel(button.dataset.modelId));
        });
    }

    function renderModelCalls(calls) {
        const items = Array.isArray(calls) ? calls : [];
        if (items.length === 0) {
            modelCallState.className = 'empty-state';
            modelCallState.textContent = '暂无调用记录';
            return;
        }

        modelCallState.className = 'call-list';
        modelCallState.innerHTML = items.map((item) => {
            const usage = item.tokenUsage || {};
            const statusClass = item.success ? 'ok' : 'failed';
            const statusText = item.success ? '成功' : '失败';
            const responseText = item.success ? item.responseText : (item.errorMessage || '无错误详情');
            return `
                <article class="call-item">
                    <div class="call-head">
                        <span class="status-pill ${statusClass}">${statusText}</span>
                        <strong>${escapeHtml(item.model || item.provider || 'model')}</strong>
                        <time>${formatTime(item.createdAt)}</time>
                    </div>
                    <div class="call-metrics">
                        <span>${formatNumber(item.durationMillis)} ms</span>
                        <span>${formatNumber(usage.totalTokens)} tokens</span>
                    </div>
                    <details>
                        <summary>Prompt</summary>
                        <pre>${escapeHtml(formatPrompt(item.requestMessagesJson))}</pre>
                    </details>
                    <details>
                        <summary>${item.success ? 'Response' : 'Error'}</summary>
                        <pre>${escapeHtml(responseText || '')}</pre>
                    </details>
                </article>
            `;
        }).join('');
    }

    function formatPrompt(value) {
        if (!value) {
            return '';
        }
        try {
            const messages = JSON.parse(value);
            if (!Array.isArray(messages)) {
                return JSON.stringify(messages, null, 2);
            }
            return messages.map((item) => `[${item.role}]\n${item.content}`).join('\n\n');
        } catch (ignore) {
            return value;
        }
    }

    function updateSessionLabel() {
        currentSessionLabel.textContent = sessionId ? `${sessionId.slice(0, 8)}...` : '未开始';
    }

    function hasTokens(tokenUsage) {
        return Number(tokenUsage.totalTokens || 0) > 0
            || Number(tokenUsage.promptTokens || 0) > 0
            || Number(tokenUsage.completionTokens || 0) > 0;
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function formatTime(value) {
        if (!value) {
            return '';
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
            return '';
        }
        return date.toLocaleString('zh-CN', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function formatNumber(value) {
        return Number(value || 0).toLocaleString('zh-CN');
    }
</script>
</body>
</html>
